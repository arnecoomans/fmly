{% with image_count=tag.images.count %}
<li class="tag bi bi-tag-fill">
  <a href="{% url 'archive:image-with-tag' tag.slug %}" class="tag" title="{{ image_count }} afbeeldingen met tag '{{ tag.title|title }}'" data-bs-toggle="tooltip" data-bs-placement="top">{% if compact %}{{ tag.name|title|truncatechars:12 }}{% else %}{{ tag.name|title }}{% endif %}</a> {% if image_count > 0 %}({{ image_count }}){% endif %}
</li>
{% endwith %}
